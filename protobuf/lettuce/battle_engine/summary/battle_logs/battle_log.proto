message BattleLog {
  lettuce.battle_engine.schema.PlayerId player_id = 1;
  oneof log {
    SetPokemonToActiveLog set_pokemon_to_active = 11;
    SetPokemonToBenchLog set_pokemon_to_bench = 12;
    AddCardToHandLog add_card_to_hand = 13;
    ReturnFieldCardToHand return_field_card_to_hand = 14;
    DiscardCardLog discard_card = 15;
    PutCardToLibraryTopLog put_card_to_library_top = 16;
    PutCardToLibraryBottomLog put_card_to_library_bottom = 17;
    PutMultipleCardsToLibraryBottomLog put_multiple_cards_to_library_bottom = 18;
    SwapPokemonLog swap_pokemon = 19;
    EvolveLog evolve = 20;
    KnockOutLog knock_out = 21;
    ApplySpecialConditionLog apply_special_condition = 22;
    RetreatLog retreat = 23;
    ApplyDamageLog apply_damage = 24;
    PreventDamageLog prevent_damage = 25;
    PreventEffectLog prevent_effect = 26;
    AttachEnergyLog attach_energy = 27;
    ApplyContinuousEffectToPokemonLog apply_continuous_effect_to_pokemon = 28;
    RecoverSpecialConditionLog recover_special_condition = 29;
    DiscardAttachedEnergyLog discard_attached_energy = 30;
    ExecuteAttackLog execute_attack = 31;
    AttackFailedLog attack_failed = 32;
    ActivateAbilityLog activate_ability = 33;
    ApplyHealLog apply_heal = 34;
    MoveEnergyLog move_energy = 35;
    PlayTrainerLog play_trainer = 36;
    DrawCardFromLibraryLog draw_card_from_library = 37;
    DiscardLibraryCardLog discard_library_card = 38;
    ShuffleLibraryLog shuffle_library = 39;
    RevealLibraryTopLog reveal_library_top = 40;
    PutCardFromHandIntoLibraryLog put_card_from_hand_into_library = 41;
    RevealOpponentHandLog reveal_opponent_hand = 42;
    AddPrizeLog add_prize = 43;
    ConcedeLog concede = 44;
    FlipCoinSingleLog flip_coin_single = 45;
    FlipCoinMultipleLog flip_coin_multiple = 46;
    DetermineTurnEndLog determine_turn_end = 47;
    TurnStartLog turn_start = 48;
    GameCompletedLog game_completed = 49;
    PokemonCheckupLog pokemon_checkup = 50;
    AttachPokemonToolLog attach_pokemon_tool = 51;
    MoveDamageAllLog move_damage_all = 52;
    ReduceCurrentHpLog reduce_current_hp = 53;
    DiscardEnergyLog discard_energy = 54;
    ChangeNextEnergyTypeLog change_next_energy_type = 55;
    PutMultipleCardsToLibraryTopLog put_multiple_cards_to_library_top = 56;
    ApplyContinuousEffectToPlayerLog apply_continuous_effect_to_player = 60;
    ActivatePokemonToolLog activate_pokemon_tool = 61;
    IncreaseCurrentHpLog increase_current_hp = 300;
    RevealOpponentLibraryLog reveal_opponent_library = 301;
    ExecuteCopiedOneShotTrainerLog execute_copied_one_shot_trainer = 302;
    ChangeAttachedEnergyTypeLog change_attached_energy_type = 400;
    DevolveLog devolve = 401;
  }
