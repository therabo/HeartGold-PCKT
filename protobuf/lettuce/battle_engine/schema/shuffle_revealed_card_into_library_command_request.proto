syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/card_id.proto";
import "lettuce/battle_engine/schema/player_id.proto";
import "lettuce/battle_engine/schema/revealment_target.proto";

message ShuffleRevealedCardIntoLibraryCommandRequest {
  PlayerId player_id = 1;
  repeated CardId cards = 2;
  PlayerId invocator_player_id = 3;
  RevealmentTarget target = 4;
}


