syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/pokemon_attack_used_count.proto";
import "lettuce/battle_engine/schema/pokemon_attack_used_count_updation.proto";

message PokemonAttackUsedCountRepeatedUpdation {
  int32 index = 1;
  oneof operation {
    PokemonAttackUsedCount add = 2;
    PokemonAttackUsedCountUpdation updation = 3;
    bool removed = 4;
  }
}


