syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/attached_energy.proto";
import "lettuce/battle_engine/schema/energy_set.proto";

message SelectAttachedEnergyActionHint {
  repeated AttachedEnergy candidates = 1;
  EnergySet selectable_energies = 2;
  EnergySet select_required_energies = 3;
}


