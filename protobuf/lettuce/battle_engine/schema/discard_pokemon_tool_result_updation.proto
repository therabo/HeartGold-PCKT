syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/battle_object_id_updation.proto";
import "lettuce/battle_engine/schema/card_id_repeated_updation.proto";

message DiscardPokemonToolResultUpdation {
  repeated CardIdRepeatedUpdation tools = 1;
  BattleObjectIdUpdation pokemon = 2;
  optional bool is_prevented = 3;
}


