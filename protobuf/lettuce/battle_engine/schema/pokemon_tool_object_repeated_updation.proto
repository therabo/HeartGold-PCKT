syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/pokemon_tool_object.proto";
import "lettuce/battle_engine/schema/pokemon_tool_object_updation.proto";

message PokemonToolObjectRepeatedUpdation {
  int32 index = 1;
  oneof operation {
    PokemonToolObject add = 2;
    PokemonToolObjectUpdation updation = 3;
    bool removed = 4;
  }
}


