syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/battle_object_id.proto";
import "lettuce/battle_engine/schema/card.proto";
import "lettuce/battle_engine/schema/continuous_effect_instance_id.proto";
import "lettuce/battle_engine/schema/special_condition_recovery.proto";

message DevolveAndReturnToHandCommandResponse {
  Card remove_card = 1;
  BattleObjectId devolved_pokemon = 2;
  bool is_prevented = 3;
  repeated SpecialConditionRecovery recoveries = 4;
  repeated ContinuousEffectInstanceId applied_effects = 5;
}


