syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/deck_supply_updation.proto";
import "lettuce/battle_engine/schema/energy_type_enum_repeated_updation.proto";
import "lettuce/battle_engine/schema/origin_card_repeated_updation.proto";

message DeckUpdation {
  repeated OriginCardRepeatedUpdation cards = 1;
  repeated EnergyTypeEnumRepeatedUpdation energy_types = 2;
  DeckSupplyUpdation supply = 3;
  optional bool keeps_origin_deck_order_on_prepare_library = 4;
}


