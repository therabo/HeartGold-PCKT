syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/notice_parameter.proto";
import "lettuce/battle_engine/schema/notice_parameter_updation.proto";

message NoticeParameterRepeatedUpdation {
  int32 index = 1;
  oneof operation {
    NoticeParameter add = 2;
    NoticeParameterUpdation updation = 3;
    bool removed = 4;
  }
}


