syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/flip_coin_reservation_entry.proto";
import "lettuce/battle_engine/schema/flip_coin_reservation_entry_updation.proto";

message FlipCoinReservationEntryRepeatedUpdation {
  int32 index = 1;
  oneof operation {
    FlipCoinReservationEntry add = 2;
    FlipCoinReservationEntryUpdation updation = 3;
    bool removed = 4;
  }
}


