syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/card_name_updation.proto";
import "lettuce/battle_engine/schema/card_names_updation.proto";
import "lettuce/battle_engine/schema/card_type_enum_updation.proto";
import "lettuce/battle_engine/schema/energy_type_enum_updation.proto";
import "lettuce/battle_engine/schema/evolution_stage_enum_updation.proto";
import "lettuce/battle_engine/schema/trainer_type_enum_updation.proto";

message CardFilterInfoUpdation {
  CardTypeEnumUpdation card_type = 1;
  TrainerTypeEnumUpdation trainer_type = 2;
  EvolutionStageEnumUpdation evolution_stage = 3;
  CardNameUpdation excluded_card_name = 4;
  EnergyTypeEnumUpdation energy_type = 5;
  CardNameUpdation preevolved_name = 6;
  CardNamesUpdation card_names = 7;
}


