syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/battle_object_id.proto";
import "lettuce/battle_engine/schema/pokemon_attack_id.proto";

message PokemonObjectFlags {
  bool will_knocked_out_by_attack_damage = 1;
  PokemonAttackId will_knocked_out_by_attack_id = 2;
  int32 evolved_turn_number = 3;
  bool reserved_knock_out = 4;
  bool is_moved_from_bench_to_active_this_turn = 5;
  bool is_damaged_by_attack_on_active = 6;
  int32 last_pokemon_attack_damage_in_active_field_turn = 7;
  BattleObjectId will_knocked_out_by_pokemon_id = 8;
}


