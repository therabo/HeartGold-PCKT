syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/battle_object_id.proto";
import "lettuce/battle_engine/schema/continuous_effect_instance_id.proto";
import "lettuce/battle_engine/schema/energy_set.proto";
import "lettuce/battle_engine/schema/special_condition_recovery.proto";

message RetreatPokemonCommandResponse {
  BattleObjectId retreated_pokemon = 1;
  repeated SpecialConditionRecovery recoveries = 2;
  EnergySet discarded = 3;
  repeated ContinuousEffectInstanceId applied_effects = 4;
}


