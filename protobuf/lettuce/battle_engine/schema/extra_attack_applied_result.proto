syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/battle_object_id.proto";
import "lettuce/battle_engine/schema/damage_amount.proto";

message ExtraAttackAppliedResult {
  BattleObjectId target = 1;
  DamageAmount damage = 2;
  bool is_weakness = 3;
  bool is_resisted = 4;
  int32 effect_delta = 5;
  bool is_prevented = 6;
}


