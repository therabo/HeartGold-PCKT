syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/action_hint.proto";
import "lettuce/battle_engine/schema/pokemon_ability_id.proto";

message ActivateAbilityActionCandidate {
  PokemonAbilityId ability_id = 1;
  bool satisfying_additional_attack_condition = 2;
  repeated ActionHint sequential_action_hints = 3;
}


