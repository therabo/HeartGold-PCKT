import "lettuce/battle_engine/schema/random_specification_updation.proto";
import "lettuce/battle_engine/schema/regulation_updation.proto";

message OriginUpdation {
  MatchUpdation match = 1;
  RegulationUpdation regulation = 2;
  RandomSpecificationUpdation random = 3;
}


