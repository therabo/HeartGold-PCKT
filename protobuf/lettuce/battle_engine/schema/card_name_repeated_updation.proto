syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/card_name.proto";
import "lettuce/battle_engine/schema/card_name_updation.proto";

message CardNameRepeatedUpdation {
  int32 index = 1;
  oneof operation {
    CardName add = 2;
    CardNameUpdation updation = 3;
    bool removed = 4;
  }
}


