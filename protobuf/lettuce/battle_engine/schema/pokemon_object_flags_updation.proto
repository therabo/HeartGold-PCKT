syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/battle_object_id_updation.proto";
import "lettuce/battle_engine/schema/pokemon_attack_id_updation.proto";

message PokemonObjectFlagsUpdation {
  optional bool will_knocked_out_by_attack_damage = 1;
  PokemonAttackIdUpdation will_knocked_out_by_attack_id = 2;
  optional int32 evolved_turn_number = 3;
  optional bool reserved_knock_out = 4;
  optional bool is_moved_from_bench_to_active_this_turn = 5;
  optional bool is_damaged_by_attack_on_active = 6;
  optional int32 last_pokemon_attack_damage_in_active_field_turn = 7;
  BattleObjectIdUpdation will_knocked_out_by_pokemon_id = 8;
}


