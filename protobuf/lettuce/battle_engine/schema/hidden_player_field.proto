syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/hidden_active_field.proto";
import "lettuce/battle_engine/schema/hidden_bench_field.proto";
import "lettuce/battle_engine/schema/player_id.proto";

message HiddenPlayerField {
  PlayerId owner_id = 1;
  HiddenActiveField active_field = 2;
  repeated HiddenBenchField bench_fields = 3;
}


