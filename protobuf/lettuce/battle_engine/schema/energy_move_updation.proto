syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/battle_object_id_updation.proto";
import "lettuce/battle_engine/schema/energy_set_updation.proto";

message EnergyMoveUpdation {
  BattleObjectIdUpdation from = 1;
  BattleObjectIdUpdation to = 2;
  EnergySetUpdation energies = 3;
  optional bool is_overflow = 4;
}


