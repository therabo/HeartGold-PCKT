syntax = "proto3";

package lettuce.battle_engine.schema.logic;

import "lettuce/battle_engine/schema/logic/hidden_logic_state.proto";
import "lettuce/battle_engine/schema/logic/resolving_logic_effect_damage_info.proto";
import "lettuce/battle_engine/schema/logic/triggered_logic_info.proto";

message HiddenLogicStore {
  repeated HiddenLogicState resolving_states = 1;
  repeated HiddenLogicState attack_states = 2;
  repeated HiddenLogicState game_states = 3;
  repeated TriggeredLogicInfo resolving_triggered_logics = 4;
  repeated TriggeredLogicInfo triggered_logics = 5;
  ResolvingLogicEffectDamageInfo resolving_logic_effect_damage_info = 6;
}


