syntax = "proto3";

package lettuce.battle_engine.schema.logic.local.triggered;

import "lettuce/battle_engine/schema/battle_object_id.proto";
import "lettuce/battle_engine/schema/card_id.proto";
import "lettuce/battle_engine/schema/pokemon_attack_id.proto";

message KnockedOutTrigger {
  lettuce.battle_engine.schema.BattleObjectId will_knocked_out_pokemon = 1;
  lettuce.battle_engine.schema.PokemonAttackId will_knocked_out_attack_id = 3;
  bool was_damaged_by_attack_on_active = 4;
  lettuce.battle_engine.schema.CardId attacker = 5;
}


