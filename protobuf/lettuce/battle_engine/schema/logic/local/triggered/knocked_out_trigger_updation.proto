syntax = "proto3";

package lettuce.battle_engine.schema.logic.local.triggered;

import "lettuce/battle_engine/schema/battle_object_id_updation.proto";
import "lettuce/battle_engine/schema/card_id_updation.proto";
import "lettuce/battle_engine/schema/pokemon_attack_id_updation.proto";

message KnockedOutTriggerUpdation {
  lettuce.battle_engine.schema.BattleObjectIdUpdation will_knocked_out_pokemon = 1;
  lettuce.battle_engine.schema.PokemonAttackIdUpdation will_knocked_out_attack_id = 3;
  optional bool was_damaged_by_attack_on_active = 4;
  lettuce.battle_engine.schema.CardIdUpdation attacker = 5;
}


