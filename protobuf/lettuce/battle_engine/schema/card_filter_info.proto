syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/card_name.proto";
import "lettuce/battle_engine/schema/card_names.proto";
import "lettuce/battle_engine/schema/card_type.proto";
import "lettuce/battle_engine/schema/energy_type.proto";
import "lettuce/battle_engine/schema/evolution_stage.proto";
import "lettuce/battle_engine/schema/trainer_type.proto";

message CardFilterInfo {
  CardType card_type = 1;
  TrainerType trainer_type = 2;
  EvolutionStage evolution_stage = 3;
  CardName excluded_card_name = 4;
  EnergyType energy_type = 5;
  CardName preevolved_name = 6;
  CardNames card_names = 7;
}


