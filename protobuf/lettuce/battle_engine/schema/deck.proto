syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/deck_supply.proto";
import "lettuce/battle_engine/schema/energy_type.proto";
import "lettuce/battle_engine/schema/origin_card.proto";

message Deck {
  repeated OriginCard cards = 1;
  repeated EnergyType energy_types = 2;
  DeckSupply supply = 3;
  bool keeps_origin_deck_order_on_prepare_library = 4;
}


