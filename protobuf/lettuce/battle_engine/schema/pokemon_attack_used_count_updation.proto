syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/player_id_updation.proto";
import "lettuce/battle_engine/schema/pokemon_attack_name_updation.proto";

message PokemonAttackUsedCountUpdation {
  PlayerIdUpdation player = 1;
  PokemonAttackNameUpdation name = 2;
  optional int32 count = 3;
}


