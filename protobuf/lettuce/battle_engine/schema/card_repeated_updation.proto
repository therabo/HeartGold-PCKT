syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/card.proto";
import "lettuce/battle_engine/schema/card_updation.proto";

message CardRepeatedUpdation {
  int32 index = 1;
  oneof operation {
    Card add = 2;
    CardUpdation updation = 3;
    bool removed = 4;
  }
}


