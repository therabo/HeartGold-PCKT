syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/inferable_ordered_card.proto";
import "lettuce/battle_engine/schema/inferable_ordered_card_updation.proto";

message InferableOrderedCardRepeatedUpdation {
  int32 index = 1;
  oneof operation {
    InferableOrderedCard add = 2;
    InferableOrderedCardUpdation updation = 3;
    bool removed = 4;
  }
}


