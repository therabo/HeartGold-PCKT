syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/pokemon_attack_used_on_previous_turn.proto";
import "lettuce/battle_engine/schema/pokemon_attack_used_on_previous_turn_updation.proto";

message PokemonAttackUsedOnPreviousTurnRepeatedUpdation {
  int32 index = 1;
  oneof operation {
    PokemonAttackUsedOnPreviousTurn add = 2;
    PokemonAttackUsedOnPreviousTurnUpdation updation = 3;
    bool removed = 4;
