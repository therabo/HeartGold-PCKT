syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/active_field.proto";
import "lettuce/battle_engine/schema/bench_field.proto";
import "lettuce/battle_engine/schema/player_id.proto";

message PlayerField {
  PlayerId owner_id = 1;
  ActiveField active_field = 2;
  repeated BenchField bench_fields = 3;
}


