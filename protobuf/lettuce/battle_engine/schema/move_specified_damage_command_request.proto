syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/battle_object_id.proto";
import "lettuce/battle_engine/schema/damage_amount.proto";
import "lettuce/battle_engine/schema/logic_specifier.proto";

message MoveSpecifiedDamageCommandRequest {
  BattleObjectId from = 1;
  BattleObjectId to = 2;
  DamageAmount amount = 3;
