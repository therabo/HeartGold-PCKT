syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/energy_type.proto";
import "lettuce/battle_engine/schema/energy_type_enum_updation.proto";

message EnergyTypeEnumRepeatedUpdation {
  int32 index = 1;
  oneof operation {
    EnergyType add = 2;
    EnergyTypeEnumUpdation updation = 3;
    bool removed = 4;
  }
}


