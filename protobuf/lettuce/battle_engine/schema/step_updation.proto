import "lettuce/battle_engine/schema/pokemon_checkup_special_condition_step_info_updation.proto";
import "lettuce/battle_engine/schema/step_state_enum_updation.proto";
import "lettuce/battle_engine/schema/step_type_enum_updation.proto";

message StepUpdation {
