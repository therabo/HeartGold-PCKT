import "lettuce/battle_engine/schema/no_operation_notation_parameter.proto";
import "lettuce/battle_engine/schema/no_operation_type.proto";

message AnnotatedNoOperationCommandRequest {
  NoOperationNotation notation = 1;
  NoOperationNotationParameter notation_parameter = 2;
