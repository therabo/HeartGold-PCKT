syntax = "proto3";

package lettuce.battle_engine.schema.effect;

import "lettuce/battle_engine/schema/battle_object_id.proto";
import "lettuce/battle_engine/schema/player_id.proto";

message ContinuousEffectTarget {
  lettuce.battle_engine.schema.BattleObjectId pokemon = 1;
  repeated lettuce.battle_engine.schema.PlayerId players = 2;
}


