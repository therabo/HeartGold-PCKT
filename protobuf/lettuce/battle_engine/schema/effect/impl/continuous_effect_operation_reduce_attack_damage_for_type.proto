syntax = "proto3";

package lettuce.battle_engine.schema.effect.impl;

import "lettuce/battle_engine/schema/battle_object_id.proto";
import "lettuce/battle_engine/schema/damage_amount.proto";
import "lettuce/battle_engine/schema/energy_type.proto";

message ContinuousEffectOperation_ReduceAttackDamageForType {
  repeated lettuce.battle_engine.schema.EnergyType type = 1;
  lettuce.battle_engine.schema.DamageAmount reduce_amount = 2;
  lettuce.battle_engine.schema.BattleObjectId target = 3;
}


