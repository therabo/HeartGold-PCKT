syntax = "proto3";

package lettuce.battle_engine.schema.effect.impl;

import "lettuce/battle_engine/schema/card_name.proto";
import "lettuce/battle_engine/schema/damage_amount.proto";
import "lettuce/battle_engine/schema/player_id.proto";

message ContinuousEffectOperation_AddAttackDamageToActiveThisTurnNameSpecified {
  lettuce.battle_engine.schema.DamageAmount add_amount = 1;
  int32 applied_turn = 2;
  lettuce.battle_engine.schema.PlayerId target = 3;
  lettuce.battle_engine.schema.CardName name1 = 4;
  lettuce.battle_engine.schema.CardName name2 = 5;
  lettuce.battle_engine.schema.CardName name3 = 6;
}


