syntax = "proto3";

package lettuce.battle_engine.schema.effect.impl;

import "lettuce/battle_engine/schema/damage_amount_updation.proto";
import "lettuce/battle_engine/schema/energy_type_enum_updation.proto";
import "lettuce/battle_engine/schema/player_id_updation.proto";

message ContinuousEffectOperation_ReduceAttackDamageForSelectedTypeFromOpponentNextTurnUpdation {
  lettuce.battle_engine.schema.DamageAmountUpdation reduce_amount = 1;
  optional int32 applied_turn = 2;
  lettuce.battle_engine.schema.PlayerIdUpdation target = 3;
  lettuce.battle_engine.schema.EnergyTypeEnumUpdation energy_type = 4;
}


