syntax = "proto3";

package lettuce.battle_engine.schema.effect.impl;

import "lettuce/battle_engine/schema/card_name.proto";
import "lettuce/battle_engine/schema/damage_amount.proto";
import "lettuce/battle_engine/schema/player_id.proto";
import "lettuce/battle_engine/schema/pokemon_ability_name.proto";

message ContinuousEffectOperation_ReduceAttackDamageIfExistsHavingAbilityExceptSpecifiedInField {
  lettuce.battle_engine.schema.PlayerId target = 1;
  lettuce.battle_engine.schema.PokemonAbilityName ability_name = 2;
  lettuce.battle_engine.schema.CardName card_name = 3;
  lettuce.battle_engine.schema.DamageAmount reduce_amount = 4;
}


