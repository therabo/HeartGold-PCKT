syntax = "proto3";

package lettuce.battle_engine.schema.effect.impl;

import "lettuce/battle_engine/schema/card_name_updation.proto";
import "lettuce/battle_engine/schema/damage_amount_updation.proto";
import "lettuce/battle_engine/schema/player_id_updation.proto";
import "lettuce/battle_engine/schema/pokemon_ability_name_updation.proto";

message ContinuousEffectOperation_AddAttackDamageToActiveIfExistsHavingAbilityExceptSpecifiedInFieldUpdation {
  lettuce.battle_engine.schema.PlayerIdUpdation target = 1;
  lettuce.battle_engine.schema.PokemonAbilityNameUpdation ability_name = 2;
  lettuce.battle_engine.schema.CardNameUpdation card_name = 3;
  lettuce.battle_engine.schema.DamageAmountUpdation add_amount = 4;
}


