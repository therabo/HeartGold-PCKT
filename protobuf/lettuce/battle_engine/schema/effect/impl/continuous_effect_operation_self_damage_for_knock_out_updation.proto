syntax = "proto3";

package lettuce.battle_engine.schema.effect.impl;

import "lettuce/battle_engine/schema/battle_object_id_updation.proto";
import "lettuce/battle_engine/schema/damage_amount_updation.proto";
import "lettuce/battle_engine/schema/pokemon_attack_id_updation.proto";

message ContinuousEffectOperation_SelfDamageForKnockOutUpdation {
  lettuce.battle_engine.schema.DamageAmountUpdation damage = 1;
  optional int32 applied_turn = 2;
  lettuce.battle_engine.schema.BattleObjectIdUpdation target = 3;
  lettuce.battle_engine.schema.BattleObjectIdUpdation knocked_out_check_pokemon = 4;
  lettuce.battle_engine.schema.PokemonAttackIdUpdation knocked_out_check_attack_id = 5;
}


