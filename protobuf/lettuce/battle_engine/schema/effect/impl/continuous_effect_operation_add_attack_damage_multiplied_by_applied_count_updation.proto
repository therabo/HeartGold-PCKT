syntax = "proto3";

package lettuce.battle_engine.schema.effect.impl;

import "lettuce/battle_engine/schema/battle_object_id_updation.proto";
import "lettuce/battle_engine/schema/damage_amount_updation.proto";
import "lettuce/battle_engine/schema/pokemon_attack_name_updation.proto";

message ContinuousEffectOperation_AddAttackDamageMultipliedByAppliedCountUpdation {
  lettuce.battle_engine.schema.BattleObjectIdUpdation target = 1;
  lettuce.battle_engine.schema.PokemonAttackNameUpdation attack = 2;
  lettuce.battle_engine.schema.DamageAmountUpdation add_amount = 3;
  optional int32 multiplier = 4;
}


