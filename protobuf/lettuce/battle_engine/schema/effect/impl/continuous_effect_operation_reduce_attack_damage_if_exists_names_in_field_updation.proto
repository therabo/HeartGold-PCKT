syntax = "proto3";

package lettuce.battle_engine.schema.effect.impl;

import "lettuce/battle_engine/schema/battle_object_id_updation.proto";
import "lettuce/battle_engine/schema/card_name_repeated_updation.proto";
import "lettuce/battle_engine/schema/damage_amount_updation.proto";

message ContinuousEffectOperation_ReduceAttackDamageIfExistsNamesInFieldUpdation {
