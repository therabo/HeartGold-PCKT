syntax = "proto3";

package lettuce.battle_engine.schema.effect.impl;

import "lettuce/battle_engine/schema/battle_object_id.proto";
import "lettuce/battle_engine/schema/energy_type.proto";

message ContinuousEffectOperation_ReduceRetreatCostOfSpecifiedTypePokemon {
  lettuce.battle_engine.schema.BattleObjectId target = 1;
  int32 reduce_cost = 2;
  lettuce.battle_engine.schema.EnergyType pokemon_type = 3;
}


