syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/card_filter_info.proto";
import "lettuce/battle_engine/schema/player_id.proto";
import "lettuce/battle_engine/schema/revealment_target.proto";

message RevealFilteredRandomLibraryCardCommandRequest {
  PlayerId player_id = 1;
  PlayerId viewer_player_id = 2;
  int32 count = 3;
  CardFilterInfo filter = 4;
  bool should_shuffle_on_not_revealed = 5;
  bool should_shuffle_on_revealed = 6;
  RevealmentTarget target = 7;
}


