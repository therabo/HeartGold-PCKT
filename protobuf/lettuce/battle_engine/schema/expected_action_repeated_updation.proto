syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/expected_action.proto";
import "lettuce/battle_engine/schema/expected_action_updation.proto";

message ExpectedActionRepeatedUpdation {
  int32 index = 1;
  oneof operation {
    ExpectedAction add = 2;
    ExpectedActionUpdation updation = 3;
    bool removed = 4;
  }
}


