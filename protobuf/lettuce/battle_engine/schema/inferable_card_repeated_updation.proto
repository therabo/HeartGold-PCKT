syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/inferable_card.proto";
import "lettuce/battle_engine/schema/inferable_card_updation.proto";

message InferableCardRepeatedUpdation {
  int32 index = 1;
  oneof operation {
    InferableCard add = 2;
    InferableCardUpdation updation = 3;
    bool removed = 4;
  }
}


