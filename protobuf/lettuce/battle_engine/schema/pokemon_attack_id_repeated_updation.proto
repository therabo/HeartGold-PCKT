syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/pokemon_attack_id.proto";
import "lettuce/battle_engine/schema/pokemon_attack_id_updation.proto";

message PokemonAttackIdRepeatedUpdation {
  int32 index = 1;
  oneof operation {
    PokemonAttackId add = 2;
    PokemonAttackIdUpdation updation = 3;
    bool removed = 4;
  }
}


