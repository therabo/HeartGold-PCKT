syntax = "proto3";

package lettuce.battle_engine.schema;

import "lettuce/battle_engine/schema/battle_object_id.proto";
import "lettuce/battle_engine/schema/player_id.proto";
import "lettuce/battle_engine/schema/special_condition_check_progress.proto";
import "lettuce/battle_engine/schema/special_condition_type.proto";

message RecoverSpecialConditionsCommandRequest {
  BattleObjectId target = 1;
  repeated SpecialConditionType types = 2;
  PlayerId check_player = 3;
  SpecialConditionCheckProgress check_progress = 4;
}


