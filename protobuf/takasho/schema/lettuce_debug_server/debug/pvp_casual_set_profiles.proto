syntax = "proto3";

package takasho.schema.lettuce_debug_server.debug;

message PvpCasualSetProfiles {
  message Types {
    message Request {
      message Types {
        message Profile {
          string player_id = 1;
          int64 total_acquired_point = 2;
          int64 total_battle_count = 3;
          int64 total_win_count = 4;
          int64 total_lose_count = 5;
          int64 max_damage = 6;
          int64 max_winning_streak = 7;
          int64 current_winning_streak = 8;
        }
      }
      repeated PvpCasualSetProfiles.Types.Request.Types.Profile profiles = 1;
    }
    message Response {
    }
  }
}


