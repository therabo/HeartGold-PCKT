syntax = "proto3";

package takasho.schema.lettuce_debug_server.debug;

import "takasho/schema/lettuce_server/resource/pvp/emblem_step.proto";

message PvpEventSetProfiles {
  message Types {
    message Request {
      message Types {
        message Profile {
          string player_id = 1;
          string event_id = 2;
          takasho.schema.lettuce_server.resource.pvp.EmblemStep emblem_step = 3;
          int64 total_acquired_point = 4;
          int64 total_battle_count = 5;
          int64 total_win_count = 6;
          int64 total_lose_count = 7;
          int64 max_damage = 8;
          int64 max_winning_streak = 9;
          int64 current_winning_streak = 10;
        }
      }
      repeated PvpEventSetProfiles.Types.Request.Types.Profile profiles = 1;
    }
    message Response {
    }
  }
}


