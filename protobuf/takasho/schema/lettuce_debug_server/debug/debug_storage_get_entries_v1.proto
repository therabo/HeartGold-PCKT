syntax = "proto3";

package takasho.schema.lettuce_debug_server.debug;

import "takasho/schema/lettuce_debug_server/debug/criterion.proto";
import "takasho/schema/lettuce_debug_server/debug/entry.proto";

message DebugStorageGetEntriesV1 {
  message Types {
    message Request {
      repeated Criterion criteria = 1;
    }
    message Response {
      repeated Entry entries = 1;
      string revision = 2;
    }
  }
}


