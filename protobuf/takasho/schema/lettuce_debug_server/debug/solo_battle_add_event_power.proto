syntax = "proto3";

package takasho.schema.lettuce_debug_server.debug;

import "takasho/schema/lettuce_server/resource/solo_battle/solo_battle_event_power.proto";

message SoloBattleAddEventPower {
  message Types {
    message Request {
      string event_id = 1;
      int64 heal_min = 2;
    }
    message Response {
      takasho.schema.lettuce_server.resource.solo_battle.SoloBattleEventPower event_power = 1;
    }
  }
}


