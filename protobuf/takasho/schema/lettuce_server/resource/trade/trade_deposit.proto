syntax = "proto3";

package takasho.schema.lettuce_server.resource.trade;

import "takasho/schema/lettuce_server/resource/item/inventory_items.proto";
import "takasho/schema/lettuce_server/resource/item/trade_item.proto";

message TradeDeposit {
  int64 power_amount = 5;
