syntax = "proto3";

package takasho.schema.lettuce_server.resource.trade;

import "google/protobuf/timestamp.proto";
import "takasho/schema/lettuce_server/resource/card/card_instance.proto";

message TradeHistory {
  string trade_session_id = 1;
  takasho.schema.lettuce_server.resource.card.CardInstance my_submission = 3;
  takasho.schema.lettuce_server.resource.card.CardInstance partner_submission = 4;
  google.protobuf.Timestamp completed_at = 5;
  int64 my_submission_card_last_amount = 6;
  int64 partner_submission_card_last_amount = 7;
  string nickname = 200;
  string icon_id = 300;
}


