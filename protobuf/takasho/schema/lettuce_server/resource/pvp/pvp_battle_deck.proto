syntax = "proto3";

package takasho.schema.lettuce_server.resource.pvp;

message PvpBattleDeck {
  message Types {
    enum DeckType {
      DECK_TYPE_UNSPECIFIED = 0;
      DECK_TYPE_MY_DECK = 1;
      DECK_TYPE_RENTAL_DECK = 2;
    }
  }
  PvpBattleDeck.Types.DeckType type = 1;
  int64 my_deck_id = 2;
  string rental_deck_id = 3;
}


