syntax = "proto3";

package takasho.schema.lettuce_server.resource.item;

message PackPowerCharger {
  message Types {
    enum Type {
      TYPE_UNSPECIFIED = 0;
      TYPE_LARGE = 1;
      TYPE_MEDIUM = 2;
      TYPE_SMALL = 3;
    }
  }
  PackPowerCharger.Types.Type type = 1;
  int64 amount = 2;
}


