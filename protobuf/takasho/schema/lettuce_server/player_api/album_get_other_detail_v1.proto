syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/resource/album/album.proto";

message AlbumGetOtherDetailV1 {
  message Types {
    message Request {
      fixed64 album_id = 1;
      string other_player_id = 2;
    }
    message Response {
      fixed64 card_limit_num = 1;
      takasho.schema.lettuce_server.resource.album.Album album = 2;
    }
  }
}


