syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/player_api/album_spine.proto";

message AlbumListV1 {
  message Types {
    message Request {
    }
    message Response {
      fixed64 album_limit_num = 1;
      repeated AlbumSpine albums = 2;
      fixed64 like_count = 3;
    }
  }
}


