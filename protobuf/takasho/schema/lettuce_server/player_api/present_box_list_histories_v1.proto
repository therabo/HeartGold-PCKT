syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "google/protobuf/timestamp.proto";
import "takasho/schema/lettuce_server/resource/present/present_item.proto";

message PresentBoxListHistoriesV1 {
  message Types {
    message Request {
      string page_token = 1;
    }
    message Response {
      message Types {
        message History {
          takasho.schema.lettuce_server.resource.present.PresentItem present = 1;
          google.protobuf.Timestamp received_at = 2;
        }
      }
      string next_page_token = 1;
      repeated PresentBoxListHistoriesV1.Types.Response.Types.History histories = 2;
    }
  }
}


