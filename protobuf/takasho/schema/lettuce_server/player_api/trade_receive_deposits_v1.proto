syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/resource/item_acquisition/item_acquisition_result.proto";
import "takasho/schema/lettuce_server/resource/trade/trade_deposit.proto";
import "takasho/schema/lettuce_server/resource/trade/trade_power.proto";

message TradeReceiveDepositsV1 {
  message Types {
    message Request {
      string trade_session_id = 1;
    }
    message Response {
      takasho.schema.lettuce_server.resource.trade.TradeDeposit deposit = 1;
      takasho.schema.lettuce_server.resource.item_acquisition.ItemAcquisitionResult item_acquisition_result = 2;
      takasho.schema.lettuce_server.resource.trade.TradePower trade_power = 3;
    }
  }
}


