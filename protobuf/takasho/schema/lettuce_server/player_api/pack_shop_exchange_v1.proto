syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/resource/item/pack_ceil_point.proto";
import "takasho/schema/lettuce_server/resource/item_acquisition/item_acquisition_result.proto";

message PackShopExchangeV1 {
  message Types {
    message Request {
      string transaction_id = 1;
      string card_id = 3;
      int32 amount = 4;
      string pack_ceil_point_shared_group_id = 5;
    }
    message Response {
      takasho.schema.lettuce_server.resource.item.PackCeilPoint pack_ceil_point = 3;
      takasho.schema.lettuce_server.resource.item_acquisition.ItemAcquisitionResult item_acquisition_result = 5;
    }
  }
}


