syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/resource/trophy/trophy.proto";

message TrophyGetStatusV1 {
  message Types {
    message Request {
      repeated string trophy_ids = 1;
      string player_id = 2;
    }
    message Response {
      repeated takasho.schema.lettuce_server.resource.trophy.Trophy trophies = 1;
    }
  }
}


