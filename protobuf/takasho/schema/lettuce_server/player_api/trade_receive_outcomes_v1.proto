syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/resource/item_acquisition/item_acquisition_result.proto";
import "takasho/schema/lettuce_server/resource/trade/trade_outcome.proto";

message TradeReceiveOutcomesV1 {
  message Types {
    message Request {
      string trade_session_id = 1;
    }
    message Response {
      takasho.schema.lettuce_server.resource.trade.TradeOutcome outcome = 1;
      takasho.schema.lettuce_server.resource.item_acquisition.ItemAcquisitionResult item_acquisition_result = 2;
    }
  }
}


