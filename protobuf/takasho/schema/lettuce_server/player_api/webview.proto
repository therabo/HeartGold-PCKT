  rpc GetPrivacyPolicyUrlV1 (WebviewGetPrivacyPolicyUrlV1.Types.Request) returns (WebviewGetPrivacyPolicyUrlV1.Types.Response);
  rpc GetPaymentServiceActUrlV1 (WebviewGetPaymentServiceActUrlV1.Types.Request) returns (WebviewGetPaymentServiceActUrlV1.Types.Response);
  rpc GetSpecifiedCommercialTransactionLawUrlV1 (WebviewGetSpecifiedCommercialTransactionLawUrlV1.Types.Request) returns (WebviewGetSpecifiedCommercialTransactionLawUrlV1.Types.Response);
  rpc GetECommerceLawUrlV1 (WebviewGetECommerceLawUrlV1.Types.Request) returns (WebviewGetECommerceLawUrlV1.Types.Response);
  rpc GetHowToUpdateUrlV1 (WebviewGetHowToUpdateUrlV1.Types.Request) returns (WebviewGetHowToUpdateUrlV1.Types.Response);
