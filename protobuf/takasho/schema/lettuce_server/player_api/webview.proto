syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/player_api/webview_get_about_url_v1.proto";
import "takasho/schema/lettuce_server/player_api/webview_get_e_commerce_law_url_v1.proto";
import "takasho/schema/lettuce_server/player_api/webview_get_game_hint_url_v1.proto";
import "takasho/schema/lettuce_server/player_api/webview_get_how_to_update_url_v1.proto";
import "takasho/schema/lettuce_server/player_api/webview_get_news_detail_url_v1.proto";
import "takasho/schema/lettuce_server/player_api/webview_get_news_v1.proto";
import "takasho/schema/lettuce_server/player_api/webview_get_payment_service_act_url_v1.proto";
