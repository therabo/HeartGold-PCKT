syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

message ShopGetNewArrivalV1 {
  message Types {
    enum Type {
      TYPE_UNSPECIFIED = 0;
      TYPE_POKE_GOLD_SHOP = 1;
      TYPE_ITEM_SHOP = 2;
      TYPE_POKE_GOLD_SHOP_PRODUCT = 3;
      TYPE_ITEM_SHOP_PRODUCT = 4;
    }
    message NewArrival {
      ShopGetNewArrivalV1.Types.Type type = 1;
      repeated string ids = 2;
    }
    message Request {
      repeated ShopGetNewArrivalV1.Types.NewArrival new_arrivals = 1;
    }
    message Response {
      repeated ShopGetNewArrivalV1.Types.NewArrival new_arrivals = 2;
    }
  }
}


