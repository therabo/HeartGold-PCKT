syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/resource/friend/friend_request.proto";
import "takasho/schema/lettuce_server/resource/player_profile/profile_spine.proto";

message FriendRejectRequestsV1 {
  message Types {
    message Request {
      repeated string sender_player_ids = 1;
    }
    message Response {
      repeated takasho.schema.lettuce_server.resource.friend.FriendRequest received_friend_requests = 1;
      repeated takasho.schema.lettuce_server.resource.player_profile.ProfileSpine profiles = 2;
    }
  }
}


