syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/resource/pvp/season_profile.proto";

message PvpRankGetCurrentSeasonProfileV1 {
  message Types {
    message Request {
    }
    message Response {
      takasho.schema.lettuce_server.resource.pvp.SeasonProfile profile = 1;
      int64 current_winning_streak = 2;
      bool is_first_time = 3;
      bool ranking_unavailable = 4;
    }
  }
}


