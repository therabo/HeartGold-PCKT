syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/resource/player_storage/criterion.proto";
import "takasho/schema/lettuce_server/resource/player_storage/entry.proto";

message PlayerStorageGetEntriesV1 {
  message Types {
    message Request {
      repeated takasho.schema.lettuce_server.resource.player_storage.Criterion criteria = 1;
    }
    message Response {
      repeated takasho.schema.lettuce_server.resource.player_storage.Entry entries = 1;
      string revision = 2;
    }
  }
}


