syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/resource/item_acquisition/item_acquisition_result.proto";
import "takasho/schema/lettuce_server/resource/pvp/pv_p_result.proto";
import "takasho/schema/lettuce_server/resource/pvp/pvp_battle_client_report.proto";
import "takasho/schema/lettuce_server/resource/pvp/rank_point_shift.proto";

message PvpRankFinishBattleV1 {
  message Types {
    message Request {
      bool is_bot = 1;
      string finish_battle_token = 2;
      takasho.schema.lettuce_server.resource.pvp.PvPResult bot_battle_result = 3;
      takasho.schema.lettuce_server.resource.pvp.PvpBattleClientReport client_report = 4;
    }
    message Response {
      takasho.schema.lettuce_server.resource.item_acquisition.ItemAcquisitionResult item_acquisition_result = 1;
      takasho.schema.lettuce_server.resource.pvp.PvPResult result = 2;
      takasho.schema.lettuce_server.resource.pvp.RankPointShift point_shift = 3;
      bool rank_recorded = 4;
    }
  }
}


