syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/resource/friend/search_result.proto";

message FriendSearchV1 {
  message Types {
    message Request {
      string search_friend_id = 1;
      string search_player_name = 2;
    }
    message Response {
      repeated takasho.schema.lettuce_server.resource.friend.SearchResult results = 1;
    }
  }
}


