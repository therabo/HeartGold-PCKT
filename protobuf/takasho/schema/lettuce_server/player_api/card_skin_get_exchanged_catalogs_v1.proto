syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/resource/card_exchange/card_exchange_catalog.proto";

message CardSkinGetExchangedCatalogsV1 {
  message Types {
    message Request {
      string card_id = 1;
    }
    message Response {
      repeated takasho.schema.lettuce_server.resource.card_exchange.CardExchangeCatalog exchanged_catalogs = 1;
    }
  }
}


