syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "google/protobuf/timestamp.proto";
import "takasho/schema/lettuce_server/resource/player_profile/profile.proto";

message SaveMyProfileV1 {
  message Types {
    message Request {
      string nickname = 1;
      string icon_id = 2;
      repeated string emblem_ids = 3;
      string message_id = 4;
    }
    message Response {
      takasho.schema.lettuce_server.resource.player_profile.Profile profile = 1;
      fixed64 required_experience = 2;
      google.protobuf.Timestamp nickname_changed_at = 3;
    }
  }
}


