syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/resource/solo_battle/solo_event_battle.proto";

message SoloBattleGetEventBattlesV1 {
  message Types {
    message Request {
      repeated string solo_event_battle_ids = 1;
    }
    message Response {
      repeated takasho.schema.lettuce_server.resource.solo_battle.SoloEventBattle solo_event_battles = 1;
    }
  }
}


