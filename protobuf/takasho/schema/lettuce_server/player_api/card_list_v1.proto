syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/resource/card/card_stock.proto";

message CardListV1 {
  message Types {
    message Request {
      string page_token = 1;
    }
    message Response {
      string next_page_token = 1;
      repeated takasho.schema.lettuce_server.resource.card.CardStock cards = 2;
    }
  }
}


