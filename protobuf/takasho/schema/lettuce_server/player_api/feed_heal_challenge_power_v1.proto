syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/resource/feed/challenge_power.proto";
import "takasho/schema/lettuce_server/resource/feed/challenge_power_heal_items.proto";
import "takasho/schema/lettuce_server/resource/item_acquisition/item_acquisition_result.proto";

message FeedHealChallengePowerV1 {
  message Types {
    message Request {
      takasho.schema.lettuce_server.resource.feed.ChallengePowerHealItems items = 1;
      string transaction_id = 2;
    }
    message Response {
      takasho.schema.lettuce_server.resource.feed.ChallengePower challenge_power = 1;
      takasho.schema.lettuce_server.resource.item_acquisition.ItemAcquisitionResult item_acquisition_result = 7;
    }
  }
}


