syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/resource/card/card_instance.proto";

message CardIsUsedV1 {
  message Types {
    message Request {
      repeated takasho.schema.lettuce_server.resource.card.CardInstance cards = 1;
    }
    message Response {
      bool is_used_from_album = 1;
      bool is_used_from_mount = 2;
      bool is_used_from_deck = 3;
      bool has_public_collection = 4;
    }
  }
}


