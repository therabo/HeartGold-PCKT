syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/resource/trade/trade_history.proto";

message TradeGetHistoryV1 {
  message Types {
    message Request {
      string page_token = 1;
    }
    message Response {
      repeated takasho.schema.lettuce_server.resource.trade.TradeHistory histories = 1;
      string next_page_token = 2;
    }
  }
}


