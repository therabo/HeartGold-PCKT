syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/player_api/album_spine.proto";
import "takasho/schema/lettuce_server/resource/collection/my_best_collection.proto";
import "takasho/schema/lettuce_server/resource/mount/mount.proto";

message CollectionListV1 {
  message Types {
    message Request {
    }
    message Response {
      repeated AlbumSpine albums = 1;
      repeated takasho.schema.lettuce_server.resource.mount.Mount mounts = 2;
      takasho.schema.lettuce_server.resource.collection.MyBestCollection my_best = 3;
    }
  }
}


