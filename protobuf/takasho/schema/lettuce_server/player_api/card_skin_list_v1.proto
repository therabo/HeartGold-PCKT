syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/resource/card_skin/card_skin_stock.proto";

message CardSkinListV1 {
  message Types {
    message Request {
      string page_token = 1;
    }
    message Response {
      string next_page_token = 1;
      repeated takasho.schema.lettuce_server.resource.card_skin.CardSkinStock card_skins = 2;
    }
  }
}


