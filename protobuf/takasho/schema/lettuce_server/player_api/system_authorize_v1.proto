syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "google/protobuf/timestamp.proto";
import "takasho/schema/lettuce_server/resource/system/device_info.proto";

message SystemAuthorizeV1 {
  message Types {
    message Response {
      message Types {
        message SignedCookie {
          string signed_cookie = 1;
          google.protobuf.Timestamp expire_at = 2;
        }
      }
      string session_token = 1;
      string player_id = 2;
      string asset_base_url = 3;
      SystemAuthorizeV1.Types.Response.Types.SignedCookie signed_cookie = 4;
    }
    message Request {
      string device_account = 1;
      takasho.schema.lettuce_server.resource.system.DeviceInfo device_info = 3;
      string id_token = 4;
    }
  }
}


