syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

import "takasho/schema/lettuce_server/player_api/deck_delete_v1.proto";
import "takasho/schema/lettuce_server/player_api/deck_get_list_v1.proto";
import "takasho/schema/lettuce_server/player_api/deck_get_rental_decks_v1.proto";
import "takasho/schema/lettuce_server/player_api/deck_save_v1.proto";

service Deck {
  rpc GetListV1 (DeckGetListV1.Types.Request) returns (DeckGetListV1.Types.Response);
  rpc SaveV1 (DeckSaveV1.Types.Request) returns (DeckSaveV1.Types.Response);
  rpc DeleteV1 (DeckDeleteV1.Types.Request) returns (DeckDeleteV1.Types.Response);
  rpc GetRentalDecksV1 (DeckGetRentalDecksV1.Types.Request) returns (DeckGetRentalDecksV1.Types.Response);
}

