syntax = "proto3";

package takasho.schema.lettuce_server.player_api;

message AlbumChangeOrderV1 {
  message Types {
    message Request {
      message Types {
        message Order {
          fixed64 album_id = 1;
          fixed64 order = 2;
        }
      }
      repeated AlbumChangeOrderV1.Types.Request.Types.Order orders = 1;
    }
    message Response {
    }
  }
}


